<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg:#0f1110;
  --text:#f5f5f5;
  --green:#48f0aa;
}

body {
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:420px;
  padding:28px 20px 50px;
  text-align:center;
}

h1 { font-size:38px; margin-bottom:2px; }

.sub {
  color:var(--green);
  margin-bottom:18px;
}

/* DIVIDERS */

.divider {
  display:flex;
  align-items:center;
  margin:24px auto;
  width:90%;
}
.divider::before,
.divider::after {
  content:"";
  flex:1;
  height:1px;
  background:white;
}
.divider span {
  margin:0 10px;
  color:var(--green);
}

.active-divider {
  display:flex;
  align-items:center;
  width:90%;
  margin:0 auto;
}
.active-divider::before,
.active-divider::after {
  content:"";
  flex:1;
  height:1px;
  background:var(--green);
}
.active-divider span {
  margin:0 10px;
  color:white;
}

/* SECTIONS */

.icon {
  font-size:32px;
  color:var(--green);
}

.section-title {
  color:var(--green);
  font-size:20px;
  margin-top:8px;
  margin-bottom:10px;
}

.select {
  margin-bottom:28px;
  font-size:17px;
  height:24px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* BUTTONS */

.button {
  width:100%;
  max-width:300px;
  margin:14px auto;
  padding:12px;
  border:2px solid var(--green);
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  cursor:pointer;
}

.button svg {
  width:22px;
  height:22px;
  stroke:var(--green);
  fill:none;
  stroke-width:2;
}

.bluetooth svg {
  width:28px;
  height:28px;
}

.button:hover {
  background:rgba(72,240,170,0.08);
}

/* INSTRUCTIONS */

.instructions-wrapper {
  width:300px;
  margin:10px auto 0;
  text-align:left;
}

.step {
  display:flex;
  align-items:flex-start;
  margin:12px 0;
  margin-left:14px;
}

.instructions-wrapper .step:first-child {
  margin-top:18px;
}

.step span.num {
  width:22px;
  height:22px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-right:12px;
  font-size:12px;
  flex-shrink:0;
}

.step:nth-child(odd) span.num {
  background:var(--green);
  color:black;
}
.step:nth-child(even) span.num {
  background:white;
  color:black;
}

.step-line {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.device {
  color:var(--green);
  white-space:nowrap;
}

/* BACK BUTTON */

.back {
  margin-top:22px;
  padding:6px 14px;
  border-radius:8px;
  background:white;
  color:black;
  display:inline-block;
  cursor:pointer;
  font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>SHARE MEDIA</h1>
<div class="sub">(Over WiFi)</div>

<div class="divider"><span>✦</span></div>

<div class="icon">♫</div>
<div class="section-title">PLAY MUSIC</div>

<div class="select">SELECT: ❨BK❩ • ♫ Guest Speaker</div>

<div class="button bluetooth" onclick="openSettings()">
<svg viewBox="0 0 24 24">
<path d="M12 3l5 5-4 4 4 4-5 5V3z"/>
<path d="M8 8l4 4-4 4"/>
</svg>
OPEN BLUETOOTH SETTINGS
</div>

<div class="divider"><span>✦</span></div>

<div class="section-title">SCREEN SHARING</div>

<div class="select" id="deviceLine">
SELECT: ❨BK❩ • ❖ Guest TV
</div>

<div id="buttons">

<div class="button" onclick="show('cast')">
<svg viewBox="0 0 24 24">
<rect x="3" y="5" width="18" height="12"/>
<path d="M4 17a5 5 0 015 5"/>
<path d="M4 14a8 8 0 018 8"/>
</svg>
CAST
</div>

<div class="button" onclick="show('airplay')">
<svg viewBox="0 0 24 24">
<rect x="3" y="5" width="18" height="12"/>
<path d="M12 15l4 5H8l4-5z"/>
</svg>
AIRPLAY
</div>

<div class="button" onclick="show('mirror')">
<svg viewBox="0 0 24 24">
<rect x="4" y="7" width="10" height="6" rx="1.5"/>
<rect x="10" y="11" width="10" height="6" rx="1.5"/>
</svg>
SCREEN MIRROR
</div>

</div>

<div id="instructions" class="instructions-wrapper" style="display:none;"></div>

<div id="back" style="display:none;">
<div class="back" onclick="goBack()">‹ BACK</div>
</div>

</div>

<script>

function openSettings() {
  const userAgent = navigator.userAgent;

  if (/android/i.test(userAgent)) {
    window.location.href = "intent:#Intent;action=android.settings.SETTINGS;end";
    return;
  }

  if (/iPhone|iPad|iPod/.test(userAgent)) {
    window.location.href = "App-Prefs:root=General";
    setTimeout(() => {
      alert("Open Settings → Bluetooth");
    }, 800);
    return;
  }

  alert("Open your device Settings, then Bluetooth.");
}

function show(type){

document.getElementById("buttons").style.display="none";
document.getElementById("back").style.display="block";
document.getElementById("instructions").style.display="block";

document.getElementById("deviceLine").innerHTML =
'<div class="active-divider"><span>✦</span></div>';

function step3(){
return `
<div class="step">
<span class="num">3</span>
<div class="step-line">
<span>Choose:</span>
<span class="device">❨BK❩ • ❖ Guest TV</span>
</div>
</div>
`;
}

let content="";

if(type==="cast"){
content=`
<div class="step"><span class="num">1</span>Open supported app (YouTube, Spotify)</div>
<div class="step"><span class="num">2</span>Tap the Cast icon</div>
${step3()}
<div class="step"><span class="num">4</span>Enter TV code (if prompted)</div>
`;
}

if(type==="airplay"){
content=`
<div class="step"><span class="num">1</span>Open supported app</div>
<div class="step"><span class="num">2</span>Tap the AirPlay icon</div>
${step3()}
<div class="step"><span class="num">4</span>Enter TV code (if prompted)</div>
`;
}

if(type==="mirror"){
content=`
<div class="step"><span class="num">1</span>Open Control Center</div>
<div class="step"><span class="num">2</span>Select "Screen Mirroring"</div>
${step3()}
<div class="step"><span class="num">4</span>Enter TV code (if prompted)</div>
`;
}

document.getElementById("instructions").innerHTML = content;
}

function goBack(){
document.getElementById("buttons").style.display="block";
document.getElementById("instructions").style.display="none";
document.getElementById("back").style.display="none";
document.getElementById("deviceLine").innerHTML =
"SELECT: ❨BK❩ • ❖ Guest TV";
}

</script>

</body>
</html>
